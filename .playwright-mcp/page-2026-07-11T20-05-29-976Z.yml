        - heading "Everything is markdown" [level=2] [ref=f10e55]
        - paragraph [ref=f10e56]: Notes, projects, and plans live in plain text you can read anywhere. Tasks sit inside your notes, right next to their context.
      - generic [ref=f10e61]:
        - heading "Plan on any horizon" [level=2] [ref=f10e62]
        - paragraph [ref=f10e63]: Daily, weekly, monthly, quarterly, and yearly notes. Schedule a task to a day, a week, or a whole quarter with a single token.
      - generic [ref=f10e71]:
        - heading "Repeats that think ahead" [level=2] [ref=f10e72]
        - paragraph [ref=f10e73]: Recurring tasks reschedule themselves when you complete them — fixed cadence, from completion, weekdays, or a day of the month.
      - generic [ref=f10e81]:
        - heading "Reminders in place" [level=2] [ref=f10e82]
        - paragraph [ref=f10e83]: Type @9am on a task and get nudged at nine. Snoozing rewrites the note, so the note stays the source of truth.
      - generic [ref=f10e89]:
        - heading "Connected thinking" [level=2] [ref=f10e90]
        - paragraph [ref=f10e91]: Wiki links, backlinks with full context, synced lines that edit everywhere at once, and a graph of how your notes relate.
      - generic [ref=f10e98]:
        - heading "Offline-first" [level=2] [ref=f10e99]
        - paragraph [ref=f10e100]: Your whole workspace lives on your device and syncs when a connection is available. No spinners between you and your notes.
      - generic [ref=f10e108]:
